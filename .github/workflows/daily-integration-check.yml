name: Daily Integration Check

on:
    schedule:
        - cron: "0 14 * * *" # Daily at 14:00 UTC
    workflow_dispatch: # so that we can also run manually, e.g. for testing

jobs:
    daily-integration-check:
        env:
            SUPERSTAQ_API_KEY: ${{ secrets.SUPERSTAQ_API_KEY }}
            TEST_USER_IBMQ_TOKEN: ${{ secrets.TEST_USER_IBMQ_TOKEN }}
            TEST_USER_IBMQ_INSTANCE: ${{ secrets.TEST_USER_IBMQ_INSTANCE }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - type: "qiskit-superstaq"
                      dependencies: "./checks-superstaq ./qiskit-superstaq"
                      group: 1
                    - type: "qiskit-superstaq"
                      dependencies: "./checks-superstaq ./qiskit-superstaq"
                      group: 2
                    - type: "qiskit-superstaq"
                      dependencies: "./checks-superstaq ./qiskit-superstaq"
                      group: 3
                    - type: "cirq-superstaq"
                      dependencies: "./checks-superstaq ./qiskit-superstaq ./cirq-superstaq"
                      group: 1
                    - type: "cirq-superstaq"
                      dependencies: "./checks-superstaq ./qiskit-superstaq ./cirq-superstaq"
                      group: 2
                    - type: "cirq-superstaq"
                      dependencies: "./checks-superstaq ./qiskit-superstaq ./cirq-superstaq"
                      group: 3
        name: Pytest integration check for ${{ matrix.type }} (${{ matrix.group }})
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6
            - name: Set up Python 3.14
              uses: actions/setup-python@v6
              with:
                  python-version: 3.14
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install ${{ matrix.dependencies }}
            - name: Pytest integration check (group ${{ matrix.group }} of 3)
              run: |
                  checks/pytest_.py --integration --splits=3 --group=${{ matrix.group }} -v ${{ matrix.type }}
            - name: Create issue if integration check failed
              if: ${{ failure() }}
              uses: JasonEtco/create-an-issue@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  filename: .github/integration-check-failure-issue.md
                  update_existing: true
